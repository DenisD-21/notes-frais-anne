<title>Notes de Frais · Clos Saint Jacques</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#F5EDE0;font-family:Georgia,'Times New Roman',serif;-webkit-tap-highlight-color:transparent;}
button,input,select{font-family:Georgia,'Times New Roman',serif;}
input:focus,select:focus{outline:none;border-color:#C4622D!important;box-shadow:0 0 0 3px rgba(196,98,45,.15);}
.hidden{display:none!important;}
/* Header */
#hdr{background:#C4622D;padding:18px 20px 0;position:sticky;top:0;z-index:90;box-shadow:0 2px 18px rgba(160,78,34,.4);}
#hdr-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
#logo-wrap{width:60px;height:60px;border-radius:50%;overflow:hidden;border:2.5px solid rgba(255,255,255,.6);box-shadow:0 2px 14px rgba(0,0,0,.25);flex-shrink:0;}
#logo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
#title-block{flex:1;}
#app-title{font-family:Georgia,'Times New Roman',serif;color:#fff;font-size:17px;font-weight:700;letter-spacing:2px;line-height:1.2;}
#app-sub{color:rgba(255,255,255,.72);font-size:11.5px;letter-spacing:.8px;margin-top:2px;}
#hdr-controls{display:flex;align-items:center;gap:8px;flex-shrink:0;}
#year-nav{display:flex;align-items:center;gap:4px;}
.yr-btn{width:26px;height:26px;border-radius:7px;background:rgba(0,0,0,.25);color:#fff;font-size:16px;border:none;cursor:pointer;line-height:1;}
#yr-lbl{color:#fff;font-size:14px;font-weight:700;min-width:36px;text-align:center;font-family:Georgia,'Times New Roman',serif;letter-spacing:1px;}
#settings-btn{width:32px;height:32px;border-radius:9px;background:rgba(0,0,0,.25);color:#fff;font-size:16px;border:none;cursor:pointer;line-height:1;transition:all .15s;}
#settings-btn.active{background:rgba(255,255,255,.9);color:#C4622D;}
#month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding-bottom:14px;}
.mpill{padding:6px 4px;border-radius:8px;font-size:11px;line-height:1.25;text-align:center;border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.22);color:rgba(255,255,255,.88);cursor:pointer;transition:all .18s;}
.mpill.active{background:rgba(255,255,255,.92);color:#C4622D;font-weight:700;border:none;}
/* Sync banner */
#sync-banner{padding:10px 22px;font-size:13px;color:#fff;display:flex;align-items:center;gap:8px;}
#sync-banner.ok{background:#4A8A35;}
#sync-banner.error{background:#C03030;}
#sync-banner.syncing{background:#C4622D;}
/* Totals */
#totals-bar{background:#FFF7EE;border-bottom:2px solid rgba(196,98,45,.13);padding:14px 22px;display:flex;justify-content:space-between;align-items:center;}
.tot-lbl{color:#C4622D;font-size:9px;letter-spacing:2.5px;margin-bottom:2px;font-weight:600;}
.tot-main{font-family:Georgia,'Times New Roman',serif;font-size:30px;color:#2E1000;line-height:1.1;}
.tot-main span{font-size:16px;color:#C4622D;}
.tot-sub{color:#A07050;font-size:11px;margin-top:2px;}
.tot-r{text-align:right;}
.tot-r .tot-main{font-size:22px;}
.tot-r .tot-main span{font-size:13px;}
/* Content */
#content-area{padding:14px 16px;}
.empty-msg{text-align:center;padding:56px 20px;color:#C09070;font-style:italic;font-size:17px;line-height:1.7;}
.empty-msg span{font-size:13px;font-style:normal;opacity:.65;}
/* Entry rows */
.erow{background:#fff;padding:11px 14px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 6px rgba(196,98,45,.09);border-radius:14px;margin-bottom:7px;cursor:pointer;transition:transform .15s,box-shadow .15s;}
.erow:active{transform:scale(.99);box-shadow:0 1px 3px rgba(196,98,45,.14);}
.erow-icon{width:38px;height:38px;border-radius:10px;flex-shrink:0;background:rgba(196,98,45,.09);display:flex;align-items:center;justify-content:center;font-size:17px;}
.erow-info{flex:1;min-width:0;}
.erow-desc{color:#2E1000;font-size:14px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.erow-meta{color:#A07050;font-size:11px;margin-top:2px;}
.erow-amt{font-family:Georgia,'Times New Roman',serif;font-size:16px;color:#2E1000;font-weight:500;flex-shrink:0;}
.del-btn{background:none;border:none;cursor:pointer;color:#A07050;font-size:20px;line-height:1;padding:0 2px;flex-shrink:0;opacity:.25;transition:opacity .2s;}
.erow:hover .del-btn,.erow:active .del-btn{opacity:1;color:#C03030;}
/* Breakdown */
#breakdown-card{margin-top:20px;background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 1px 6px rgba(196,98,45,.09);border:1px solid rgba(196,98,45,.12);}
#settlement-card{margin-top:14px;background:#fff;border-radius:14px;padding:16px 18px;box-shadow:0 1px 6px rgba(196,98,45,.09);border:1px solid rgba(196,98,45,.12);}
.set-row{display:flex;align-items:center;gap:10px;margin-top:10px;}
.set-row label{flex:0 0 90px;color:#2E1000;font-size:13px;font-weight:500;}
.set-row input,.set-row select{flex:1;padding:8px 10px;border:1.5px solid rgba(196,98,45,.25);border-radius:8px;background:#fff;color:#2E1000;font-family:Georgia,'Times New Roman',serif;font-size:14px;}
.set-row input:focus,.set-row select:focus{border-color:#C4622D;outline:none;}
.bk-title{color:#C4622D;font-size:9.5px;letter-spacing:2.5px;margin-bottom:12px;font-weight:600;}
.bk-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(196,98,45,.07);}
.bk-lbl{color:#2E1000;font-size:13px;}
.bk-sub{color:#A07050;font-size:11px;margin-left:6px;}
.bk-val{font-family:Georgia,'Times New Roman',serif;color:#2E1000;font-size:15px;}
.bk-total{display:flex;justify-content:space-between;padding-top:10px;}
.bk-total span:first-child{color:#2E1000;font-weight:600;font-size:14px;}
.bk-total span:last-child{font-family:Georgia,'Times New Roman',serif;color:#C4622D;font-size:18px;font-weight:600;}
/* Action buttons */
#action-btns{margin-top:14px;display:flex;flex-direction:column;gap:8px;}
.btn-primary{width:100%;padding:14px;border-radius:13px;border:none;background:#C4622D;color:#fff;font-size:12px;letter-spacing:2px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(196,98,45,.35);}
.btn-dashed{width:100%;padding:14px;border-radius:13px;border:1.5px dashed #C4622D;background:transparent;color:#C4622D;font-size:12px;letter-spacing:1.5px;font-weight:600;cursor:pointer;}
.btn-outline{width:100%;padding:12px;border-radius:13px;border:1.5px solid rgba(196,98,45,.4);background:transparent;color:#C4622D;font-size:11px;letter-spacing:1.5px;font-weight:600;cursor:pointer;}
/* Settings */
#settings-view{padding:20px 20px 40px;}
#settings-view h2{font-family:Georgia,'Times New Roman',serif;font-size:22px;color:#2E1000;margin-bottom:20px;}
.scard{background:#fff;border-radius:14px;padding:16px 18px;margin-bottom:16px;border:1px solid rgba(196,98,45,.15);}
.scard.ok{border-color:#4A8A35;}
.sok-title{color:#4A8A35;font-weight:600;font-size:14px;margin-bottom:4px;}
.smeta{color:#808080;font-size:12px;margin-top:2px;}
.step-row{display:flex;gap:10px;margin-bottom:7px;align-items:flex-start;}
.step-num{color:#C4622D;font-weight:700;font-size:13px;flex-shrink:0;min-width:16px;}
.step-txt{color:#5C3030;font-size:13px;line-height:1.45;}
.flabel{display:block;color:#C4622D;font-size:10px;letter-spacing:2px;margin-bottom:6px;font-weight:600;margin-top:14px;}
.flabel.check-row{display:flex;align-items:center;gap:8px;letter-spacing:.5px;font-size:13px;color:#2E1000;text-transform:none;font-weight:500;}
.flabel.check-row input{width:18px;height:18px;accent-color:#C4622D;margin:0;}
#calc-btn{width:100%;padding:11px;margin-top:6px;border-radius:11px;border:1.5px dashed rgba(196,98,45,.45);background:#FEF5EC;color:#C4622D;font-family:Georgia,'Times New Roman',serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
#calc-btn:active{transform:scale(.98);}
#calc-btn.loading{opacity:.55;pointer-events:none;}
#calc-btn.ok{background:#E8F3E2;color:#4A8A35;border-color:rgba(74,138,53,.45);border-style:solid;}
#calc-btn.err{background:#FCE8E6;color:#9A3D1E;border-color:rgba(154,61,30,.45);border-style:solid;}
.finput{width:100%;padding:12px 14px;border:1.5px solid rgba(196,98,45,.25);border-radius:11px;background:#fff;font-size:15px;color:#2E1000;font-family:Georgia,'Times New Roman',serif;margin-bottom:4px;}
.sbtn{width:100%;padding:12px;border-radius:12px;border:none;background:#C4622D;color:#fff;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px;}
.sbtn.outline{background:transparent;border:1.5px solid rgba(196,98,45,.4);color:#C4622D;}
.code-box{background:#FFF8F0;border-radius:11px;padding:14px;margin-top:14px;border:1px solid rgba(196,98,45,.2);}
.code-box-title{color:#2E1000;font-size:13px;font-weight:600;margin-bottom:8px;}
.code-box-txt{color:#5C3030;font-size:13px;line-height:1.65;}
.code-box-txt code{background:rgba(196,98,45,.1);padding:1px 5px;border-radius:4px;font-size:12px;}
.s2btn{display:flex;gap:10px;margin-top:10px;}
.s2btn .sbtn{flex:1;}
.s2btn .sbtn:first-child{flex:0 0 auto;padding:12px 16px;background:transparent;border:1.5px solid rgba(196,98,45,.35);color:#C4622D;}
/* Form overlay */
#form-overlay{position:fixed;inset:0;background:rgba(26,8,0,.6);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
#form-sheet{background:#F5EDE0;border-radius:22px 22px 0 0;width:100%;max-width:620px;padding:26px 22px 48px;max-height:88vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.32,.72,0,1);}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.form-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.form-title{font-family:Georgia,'Times New Roman',serif;font-size:22px;color:#2E1000;}
.form-close{background:rgba(196,98,45,.1);border:none;width:32px;height:32px;border-radius:9px;cursor:pointer;color:#C4622D;font-size:20px;line-height:1;}
#mode-tabs{display:flex;background:rgba(196,98,45,.08);border-radius:12px;padding:3px;margin-bottom:20px;gap:3px;}
.mtab{flex:1;padding:9px 6px;border-radius:10px;background:transparent;color:#C4622D;font-size:13px;font-weight:400;border:none;cursor:pointer;transition:all .18s;}
.mtab.active{background:#C4622D;color:#fff;font-weight:600;}
#ik-preview-box{background:rgba(196,98,45,.08);border-radius:11px;padding:12px 16px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;border:1px solid rgba(196,98,45,.2);}
#ik-preview-box span:first-child{color:#2E1000;font-size:13px;}
#ik-preview-val{font-family:Georgia,'Times New Roman',serif;color:#C4622D;font-size:24px;font-weight:500;}
.form-actions{display:flex;gap:10px;margin-top:4px;}
.form-actions button:first-child{flex:1;padding:13px;border-radius:12px;border:1.5px solid rgba(196,98,45,.35);background:transparent;color:#C4622D;font-size:13px;cursor:pointer;}
#save-btn{flex:2;padding:13px;border-radius:12px;border:none;background:#C4622D;color:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:background .3s;box-shadow:0 4px 16px rgba(196,98,45,.3);}
#save-btn.ok{background:#5A9A40;}
/* FAB */
#fab{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);width:calc(100% - 48px);max-width:340px;padding:15px;border-radius:16px;border:none;cursor:pointer;background:#C4622D;color:#fff;font-size:12px;letter-spacing:2.5px;font-weight:700;font-family:'EB Garamond',serif;box-shadow:0 10px 36px rgba(196,98,45,.45);z-index:100;}
#app{max-width:620px;margin:0 auto;min-height:100vh;padding-bottom:100px;}
</style>
</head>

<script>
// ─── Constants ────────────────────────────────────────────
const OG='#C4622D',DK='#2E1000';
const BAREME={'3CV':0.502,'4CV':0.575,'5CV':0.636,'6CV':0.665,'7CV+':0.697};
const DEFAULT_VEH='5CV';
const DEFAULT_FROM='1 rue Pierre Mouchoux, 21190 Meursault';
// Coords de secours pour l'adresse par défaut (géocodées via Nominatim) —
// évite un appel réseau inutile si l'utilisateur ne change pas le départ.
const DEFAULT_FROM_COORDS={lat:46.9777586,lon:4.7686410};
const CAT_KEYS=['transport','peage','hotel','restaurant','telephone','divers'];
const CAT_LABELS=['Loc. V\u00e9hicule / Avion / Train / Taxi','Parking / P\u00e9age','H\u00f4tel','Restaurant / Bar','T\u00e9l\u00e9phone','Divers'];
const CAT_ICONS=['✈️','🛣️','🏨','🍽️','📱','📎'];
const MONTHS=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
const STORE='clos-sj-ndf-anne';
const DBX_REDIR='http://localhost';

// ─── State ────────────────────────────────────────────────
let S={
  month:new Date().getMonth(), year:new Date().getFullYear(),
  entries:{}, settlements:{}, view:'main', mode:'ik', editing:null,
  dbx:{key:'',secret:'',rt:'',path:'/Notes_de_frais_Anne.xlsx',ok:false,step:'idle',verifier:'',challenge:''},
  sync:{status:null,msg:''}, lastSync:null
};
const PAY_MEANS=['','Virement','Chèque','Espèces','Carte bancaire','Autre'];

// ─── Storage ──────────────────────────────────────────────
const LS={
  get:k=>{try{return localStorage.getItem(k);}catch(e){return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}}
};
function sk(m){return STORE+':'+S.year+':'+m;}
function settKey(){return STORE+':sett:'+S.year;}
function loadYear(){
  const all={};
  for(let m=0;m<12;m++){const v=LS.get(sk(m));all[m]=v?JSON.parse(v):[];}
  S.entries=all;
  const ss=LS.get(settKey());S.settlements=ss?JSON.parse(ss):{};
  try{
    const s=LS.get(STORE+':dbx');
    if(s){const d=JSON.parse(s);S.dbx.key=d.k||'';S.dbx.secret=d.s||'';S.dbx.rt=d.r||'';S.dbx.path=d.p||'/{year} - Notes_de_frais_Anne.xlsx';S.dbx.verifier=d.v||'';S.dbx.challenge=d.ch||'';S.dbx.step=d.st||'idle';S.dbx.ok=!!d.r;if(S.dbx.step==='code'&&!S.dbx.challenge)S.dbx.step='idle';
      // Migration : remplacer l'année courante par {year} si le template n'est pas déjà en place
      const cy=new Date().getFullYear();
      if(S.dbx.path&&!S.dbx.path.includes('{year}')){const re=new RegExp('\\b'+cy+'\\b','g');if(re.test(S.dbx.path)){S.dbx.path=S.dbx.path.replace(re,'{year}');saveDbx();}}
    }
    S.lastSync=LS.get(STORE+':ls');
  }catch(e){}
}

// ─── ZIP / XLSX builder ────────────────────────────────────
function crc32(d){
  if(!crc32._t){crc32._t=new Uint32Array(256);for(let i=0;i<256;i++){let c=i;for(let j=0;j<8;j++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);crc32._t[i]=c;}}
  let c=0xFFFFFFFF;for(let i=0;i<d.length;i++)c=(c>>>8)^crc32._t[(c^d[i])&0xFF];return(c^0xFFFFFFFF)>>>0;
}
function u8(s){return new TextEncoder().encode(s);}
function setU16(b,o,v){b[o]=v&255;b[o+1]=(v>>8)&255;}
function setU32(b,o,v){b[o]=v&255;b[o+1]=(v>>8)&255;b[o+2]=(v>>16)&255;b[o+3]=(v>>24)&255;}
function createZip(files){
  const parts=[],cds=[];let off=0;
  for(const{name,data}of files){
    const nb=u8(name),db=typeof data==='string'?u8(data):data,crc=crc32(db);
    const lh=new Uint8Array(30+nb.length);
    setU32(lh,0,0x04034b50);setU16(lh,4,20);setU16(lh,6,0);setU16(lh,8,0);setU16(lh,10,0);setU16(lh,12,0);
    setU32(lh,14,crc);setU32(lh,18,db.length);setU32(lh,22,db.length);setU16(lh,26,nb.length);setU16(lh,28,0);lh.set(nb,30);
    const cd=new Uint8Array(46+nb.length);
    setU32(cd,0,0x02014b50);setU16(cd,4,20);setU16(cd,6,20);setU16(cd,8,0);setU16(cd,10,0);setU16(cd,12,0);setU16(cd,14,0);
    setU32(cd,16,crc);setU32(cd,20,db.length);setU32(cd,24,db.length);setU16(cd,28,nb.length);setU16(cd,30,0);setU16(cd,32,0);
    setU16(cd,34,0);setU16(cd,36,0);setU32(cd,38,0);setU32(cd,42,off);cd.set(nb,46);
    cds.push(cd);parts.push(lh,db);off+=lh.length+db.length;
  }
  const cdSz=cds.reduce((s,d)=>s+d.length,0);
  const eocd=new Uint8Array(22);
  setU32(eocd,0,0x06054b50);setU16(eocd,4,0);setU16(eocd,6,0);setU16(eocd,8,files.length);setU16(eocd,10,files.length);setU32(eocd,12,cdSz);setU32(eocd,16,off);setU16(eocd,20,0);
  const all=[...parts,...cds,eocd],tot=all.reduce((s,p)=>s+p.length,0),res=new Uint8Array(tot);
  let pos=0;for(const p of all){res.set(p,pos);pos+=p.length;}
  return res;
}
function escX(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function colLetter(n){let s='';n++;while(n>0){s=String.fromCharCode(65+((n-1)%26))+s;n=Math.floor((n-1)/26);}return s;}
// Excel date serial (accounts for the 1900 leap-year bug)
function xlDate(yyyy_mm_dd){if(!yyyy_mm_dd)return null;const[y,m,d]=yyyy_mm_dd.split('-').map(Number);const ms=Date.UTC(y,m-1,d)-Date.UTC(1899,11,30);return Math.floor(ms/86400000);}
// Cell can be: string, number, null/'', or {v?, f?, s?} (v=value, f=formula, s=style index)
function cellXml(c,ci,ri){
  if(c===null||c===undefined||c==='')return'';
  const ref=colLetter(ci)+(ri+1);
  let s,f,v,t;
  if(typeof c==='object'){s=c.s;f=c.f;v=c.v;}
  else{v=c;}
  const sa=s!==undefined?` s="${s}"`:'';
  if(f!==undefined){
    const va=v!==undefined?`<v>${v}</v>`:'';
    return `<c r="${ref}"${sa}><f>${escX(f)}</f>${va}</c>`;
  }
  if(typeof v==='number')return `<c r="${ref}"${sa}><v>${v}</v></c>`;
  return `<c r="${ref}"${sa} t="inlineStr"><is><t>${escX(v)}</t></is></c>`;
}
function rowsToXml(rows){
  return rows.map((row,ri)=>{
    const cells=row.map((c,ci)=>cellXml(c,ci,ri)).join('');
    return cells?`<row r="${ri+1}">${cells}</row>`:'';
  }).filter(Boolean).join('');
}

//                6=cream text/bold, 7=cream €, 8=cream km, 9=cream date,
//                10=brown total text, 11=brown total €, 12=brown total km
function buildXlsx(sheets){
  const files=[];
  const ct='<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/><Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'+sheets.map((_,i)=>`<Override PartName="/xl/worksheets/sheet${i+1}.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>`).join('')+'</Types>';
  files.push({name:'[Content_Types].xml',data:ct});
  files.push({name:'_rels/.rels',data:'<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/></Relationships>'});
  files.push({name:'xl/workbook.xml',data:'<?xml version="1.0" encoding="UTF-8"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships"><sheets>'+sheets.map((s,i)=>`<sheet name="${escX(s.name)}" sheetId="${i+1}" r:id="rId${i+1}"/>`).join('')+'</sheets></workbook>'});
  files.push({name:'xl/_rels/workbook.xml.rels',data:'<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rIdStyles" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/styles" Target="styles.xml"/>'+sheets.map((s,i)=>`<Relationship Id="rId${i+1}" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet${i+1}.xml"/>`).join('')+'</Relationships>'});
  files.push({name:'xl/styles.xml',data:STYLES_XML});
  sheets.forEach((sheet,si)=>{
    const cols=sheet.cols?`<cols>${sheet.cols.map((w,i)=>`<col min="${i+1}" max="${i+1}" width="${w}" customWidth="1"/>`).join('')}</cols>`:'';
    const tab=sheet.tabColor?`<sheetPr><tabColor rgb="${sheet.tabColor}"/></sheetPr>`:'';
    const views=`<sheetViews><sheetView workbookViewId="0"${si===0?' tabSelected="1"':''}><pane ySplit="1" topLeftCell="A2" activePane="bottomLeft" state="frozen"/></sheetView></sheetViews>`;
    files.push({name:`xl/worksheets/sheet${si+1}.xml`,data:`<?xml version="1.0" encoding="UTF-8"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">${tab}<dimension ref="A1"/>${views}<sheetFormatPr defaultRowHeight="16" defaultColWidth="11"/>${cols}<sheetData>${rowsToXml(sheet.rows)}</sheetData></worksheet>`});
  });
  return createZip(files);
}
function buildExcel(year){
  // ── Feuille "Données" : ligne par dépense ────────────────────────
  // Colonnes : Mois | Date | Type | Catégorie | Motif | Véhicule | Km | IK (€) | Montant (€)
  const dataHeader=['Mois','Date','Type','Catégorie','Motif','Véhicule','Km','IK (€)','Montant (€)'].map(h=>({v:h,s:1}));
  const dataRows=[dataHeader];
  MONTHS.forEach((mName,mi)=>{
    const entries=[...(S.entries[mi]||[])].sort((a,b)=>a.date.localeCompare(b.date));
    entries.forEach(e=>{
      const dateSerial=xlDate(e.date);
      if(e.type==='ik'){
        dataRows.push([
          {v:mName,s:2},
          dateSerial!==null?{v:dateSerial,s:5}:{v:'',s:2},
          {v:'IK',s:2},
          {v:'',s:2},
          {v:e.description||'',s:2},
          {v:e.vehicle||'',s:2},
          {v:+e.km||0,s:4},
          {v:+e.ik||0,s:3},
          {v:'',s:3}
        ]);
      } else {
        const label=CAT_LABELS[CAT_KEYS.indexOf(e.category)]||e.category;
        dataRows.push([
          {v:mName,s:2},
          dateSerial!==null?{v:dateSerial,s:5}:{v:'',s:2},
          {v:'Frais',s:2},
          {v:label,s:2},
          {v:e.description||'',s:2},
          {v:'',s:2},
          {v:'',s:4},
          {v:'',s:3},
          {v:+e.amount||0,s:3}
        ]);
      }
    });
  });
  // ── Feuille "Récapitulatif" : 12 mois × catégories en SUMIFS + règlement ──
  // Colonnes : Mois | <6 catégories> | Total Frais | Km | IK (€) | TOTAL GÉNÉRAL | Date règlement | Moyen | Référence
  const recapHeader=['Mois',...CAT_LABELS,'Total Frais','Km','IK (€)','TOTAL GÉNÉRAL','Date règlement','Moyen','Référence'].map(h=>({v:h,s:1}));
  const recapRows=[recapHeader];
  MONTHS.forEach((mName,mi)=>{
    const r=mi+2; // numéro de ligne dans la feuille (1=header, 2=Janvier…)
    const sett=S.settlements[mi]||{};
    const dateSerial=xlDate(sett.date);
    const row=[{v:mName,s:6}]; // Mois (colonne A) — fond crème
    // 6 catégories — SUMIFS sur Données
    CAT_LABELS.forEach((label)=>{
      row.push({f:`SUMIFS(Données!I:I,Données!A:A,A${r},Données!D:D,"${label.replace(/"/g,'""')}")`,s:7});
    });
    // Total Frais (colonne H)
    row.push({f:`SUM(B${r}:G${r})`,s:7});
    // Km (colonne I)
    row.push({f:`SUMIFS(Données!G:G,Données!A:A,A${r})`,s:8});
    // IK € (colonne J)
    row.push({f:`SUMIFS(Données!H:H,Données!A:A,A${r})`,s:7});
    // TOTAL GÉNÉRAL (colonne K) = Total Frais + IK
    row.push({f:`H${r}+J${r}`,s:7});
    // Date règlement (L)
    row.push(dateSerial!==null?{v:dateSerial,s:9}:{v:'',s:6});
    // Moyen (M)
    row.push({v:sett.means||'',s:6});
    // Référence (N)
    row.push({v:sett.ref||'',s:6});
    recapRows.push(row);
  });
  // Ligne TOTAL ANNUEL (brun foncé)
  const totRow=[{v:'TOTAL ANNUEL '+year,s:10}];
  for(let ci=1;ci<=10;ci++){
    const L=colLetter(ci);
    const styleIdx=ci===8?12:11; // Km en col I → style 12, sinon €
    totRow.push({f:`SUM(${L}2:${L}13)`,s:styleIdx});
  }
  totRow.push({v:'',s:10},{v:'',s:10},{v:'',s:10});
  recapRows.push(totRow);
  // Largeurs colonnes
  const dataCols=[10,12,8,32,38,16,8,12,14];
  const recapCols=[12,16,16,12,16,12,12,14,10,12,16,14,14,18];
  return buildXlsx([
    {name:'Données',rows:dataRows,cols:dataCols,tabColor:'FFC4622D'},
    {name:'Récapitulatif',rows:recapRows,cols:recapCols,tabColor:'FF2E1000'}
  ]);
}

    <div class="set-row"><label>Moyen</label><select id="set-means" onchange="onSettlementChange()">${PAY_MEANS.map(m=>`<option value="${m}"${m===(s.means||'')?' selected':''}>${m||'—'}</option>`).join('')}</select></div>
    <div class="set-row"><label>Référence</label><input type="text" id="set-ref" value="${escX(s.ref||'')}" placeholder="ex : VIR-2026-04" onchange="onSettlementChange()"></div>`;
}
function onSettlementChange(){
  saveSettlement(S.month,{
    date:document.getElementById('set-date').value,
    means:document.getElementById('set-means').value,
    ref:document.getElementById('set-ref').value.trim()
  });
}
function renderActionBtns(){
  const me=S.entries[S.month]||[];
  if(!me.length){document.getElementById('action-btns').innerHTML='';return;}
  document.getElementById('action-btns').innerHTML=S.dbx.ok
    ?`<button class="btn-primary" onclick="syncDropbox()">&#9729; SYNCHRONISER AVEC DROPBOX</button><button class="btn-outline" onclick="doCSV()">Exporter CSV (option de secours)</button>`
    :`<button class="btn-dashed" onclick="S.view='settings';render()">&#9881; Configurer Dropbox pour synchroniser</button><button class="btn-outline" onclick="doCSV()">Exporter CSV</button>`;

      <label class="flabel">CHEMIN DU FICHIER SUR DROPBOX</label>

      </div>

      <input class="finput" id="s-path" value="${escX(S.dbx.path)}" placeholder="/.../{year} - Notes_de_frais_Anne.xlsx">

}
function showSync(status,msg){
  S.sync={status,msg};
  const b=document.getElementById('sync-banner');
  if(!status){b.classList.add('hidden');return;}
  b.className=status;b.innerHTML=(status==='syncing'?'⏳':status==='ok'?'✓':'⚠')+' '+msg;
}

// ─── Actions ──────────────────────────────────────────────
function setMonth(i){S.month=i;render();}
function chgYear(d){S.year+=d;loadYear();render();}
function toggleView(){S.view=S.view==='settings'?'main':'settings';render();}

function showForm(entry){
  document.getElementById('form-overlay').classList.remove('hidden');
  const today=new Date().toISOString().slice(0,10);
  const isEdit=!!entry;
  document.querySelector('.form-title').textContent=isEdit?'Modifier la dépense':'Nouvelle dépense';
  document.getElementById('save-btn').textContent=isEdit?'Enregistrer les modifications':'Enregistrer';
  document.getElementById('f-date').value=entry?entry.date:today;
  document.getElementById('f-desc').value=entry?entry.description:'';
  document.getElementById('f-amt').value=entry&&entry.type==='frais'?entry.amount:'';
  document.getElementById('f-km').value=entry&&entry.type==='ik'?entry.km:'';
  document.getElementById('f-from').value=entry&&entry.type==='ik'?(entry.from||DEFAULT_FROM):DEFAULT_FROM;
  document.getElementById('f-to').value=entry&&entry.type==='ik'?(entry.to||''):'';
  document.getElementById('f-return').checked=entry&&entry.type==='ik'?entry.roundTrip!==false:true;
  document.getElementById('f-veh').value=entry&&entry.type==='ik'?entry.vehicle:DEFAULT_VEH;
  if(entry&&entry.type==='frais')document.getElementById('f-cat').value=entry.category;
  document.getElementById('ik-preview-box').classList.add('hidden');
  resetCalcBtn();
  setMode(entry?entry.type:S.mode);
  if(entry&&entry.type==='ik')updIKPreview();
}
function editEntry(id){
  const entry=(S.entries[S.month]||[]).find(e=>e.id===id);
  if(!entry)return;
  S.editing={year:S.year,month:S.month,id};
  showForm(entry);
}
function resetCalcBtn(){
  const b=document.getElementById('calc-btn');
  if(!b)return;
  b.className='';b.innerHTML='&#128506; Calculer la distance';
}
function hideForm(){document.getElementById('form-overlay').classList.add('hidden');S.editing=null;}
function setMode(m){
  S.mode=m;
  document.getElementById('tab-frais').classList.toggle('active',m==='frais');
  document.getElementById('tab-ik').classList.toggle('active',m==='ik');
  document.getElementById('frais-fields').classList.toggle('hidden',m==='ik');
  document.getElementById('ik-fields').classList.toggle('hidden',m==='frais');
}
// Géocodage (Nominatim) + routage (OSRM) — gratuits, sans clé.
async function geocodeAddr(q){
  const url='https://nominatim.openstreetmap.org/search?format=json&limit=1&addressdetails=0&q='+encodeURIComponent(q);
  const r=await fetch(url,{headers:{'Accept-Language':'fr'}});
  if(!r.ok)throw new Error('Nominatim '+r.status);
  const a=await r.json();
  if(!a.length)throw new Error('Adresse introuvable : '+q);
  return{lat:+a[0].lat,lon:+a[0].lon};
}
async function routeKm(a,b){
  const url=`https://router.project-osrm.org/route/v1/driving/${a.lon},${a.lat};${b.lon},${b.lat}?overview=false`;
  const r=await fetch(url);
  if(!r.ok)throw new Error('OSRM '+r.status);
  const d=await r.json();
  if(d.code!=='Ok'||!d.routes?.length)throw new Error('Route introuvable');
  return d.routes[0].distance/1000;
}
async function calcDistance(){
  const btn=document.getElementById('calc-btn');
  const fromAddr=document.getElementById('f-from').value.trim()||DEFAULT_FROM;
  const toAddr=document.getElementById('f-to').value.trim();
  if(!toAddr){btn.className='err';btn.innerHTML='&#9888; Saisissez le lieu d\'arriv&eacute;e';setTimeout(resetCalcBtn,2500);return;}
  btn.className='loading';btn.innerHTML='&#8987; Recherche en cours&hellip;';
  try{
    const from=fromAddr===DEFAULT_FROM?DEFAULT_FROM_COORDS:await geocodeAddr(fromAddr);
    const to=await geocodeAddr(toAddr);
    const oneWay=await routeKm(from,to);
    const ar=document.getElementById('f-return').checked;
    const km=Math.round(oneWay*(ar?2:1));
    document.getElementById('f-km').value=km;
    btn.className='ok';btn.innerHTML=`&#10003; ${km} km ${ar?'(aller-retour)':'(aller simple)'}`;
    updIKPreview();
    setTimeout(resetCalcBtn,5000);
  }catch(err){
    btn.className='err';btn.innerHTML='&#9888; '+escX(err.message).slice(0,60);
    setTimeout(resetCalcBtn,4000);
  }
}
function updIKPreview(){
  const km=parseFloat(document.getElementById('f-km').value);
  const veh=document.getElementById('f-veh').value;
  const box=document.getElementById('ik-preview-box');
  if(km>0&&BAREME[veh]){
    document.getElementById('ik-preview-val').textContent=fmtNum(+(km*BAREME[veh]).toFixed(2))+' €';
    box.classList.remove('hidden');
  } else {box.classList.add('hidden');}
}
function saveEntry(){
  const date=document.getElementById('f-date').value;
  const desc=document.getElementById('f-desc').value.trim();
  if(!date||!desc)return;
  const wasEdit=!!S.editing;
  let e={id:wasEdit?S.editing.id:Date.now(),date,description:desc,type:S.mode};
  if(S.mode==='ik'){
    const km=parseFloat(document.getElementById('f-km').value);
    const veh=document.getElementById('f-veh').value;
    if(!km||km<=0)return;
    const from=document.getElementById('f-from').value.trim();
    const to=document.getElementById('f-to').value.trim();
    const roundTrip=document.getElementById('f-return').checked;
    e={...e,vehicle:veh,km,ik:+(km*BAREME[veh]).toFixed(2),from,to,roundTrip};
  } else {
    const amt=parseFloat(document.getElementById('f-amt').value);
    if(!amt||amt<=0)return;
    e={...e,category:document.getElementById('f-cat').value,amount:amt};
  }
  const targetYear=yearFromDate(date),targetMonth=monthFromDate(date);
  // Retirer de l'ancien emplacement si édition
  if(wasEdit){
    const {year:oy,month:om,id:oid}=S.editing;
    const old=getMonthRaw(oy,om).filter(x=>x.id!==oid);
    saveMonthRaw(oy,om,old);
  }
  // Ajouter à la cible (merge)
  const existing=getMonthRaw(targetYear,targetMonth).filter(x=>x.id!==e.id);
  saveMonthRaw(targetYear,targetMonth,[...existing,e].sort((a,b)=>a.date.localeCompare(b.date)));
  // Bascule auto sur le mois/année de la dépense
  const switched=targetYear!==S.year||targetMonth!==S.month||(wasEdit&&(S.editing.year!==targetYear||S.editing.month!==targetMonth));
  if(targetYear!==S.year){S.year=targetYear;loadYear();}
  S.month=targetMonth;
  S.editing=null;
  const btn=document.getElementById('save-btn');
  btn.textContent='✓ Enregistré !';btn.classList.add('ok');
  setTimeout(()=>{
    btn.textContent='Enregistrer';btn.classList.remove('ok');
    hideForm();render();
    if(switched){showSync('ok',(wasEdit?'Déplacée vers ':'Ajoutée à ')+MONTHS[targetMonth]+' '+targetYear);setTimeout(()=>showSync(null,''),2500);}
  },700);
}
function delEntry(id){
  const updated=(S.entries[S.month]||[]).filter(e=>e.id!==id);
  saveMonth(S.month,updated);render();
}

// Dropbox
async function startOAuth(){
  S.dbx.key=document.getElementById('s-key').value.trim();
  S.dbx.secret=document.getElementById('s-sec').value.trim();
  S.dbx.path=document.getElementById('s-path').value.trim()||'/{year} - Notes_de_frais_Anne.xlsx';
  if(!S.dbx.key||!S.dbx.secret)return;
  S.dbx.verifier=genVerifier();
  S.dbx.challenge=await genChallenge(S.dbx.verifier);
  S.dbx.step='code';
  saveDbx();
  renderSettings();
}
async function completeOAuth(){
  const raw=document.getElementById('s-code').value.trim();
  if(!raw)return;
  const m=raw.match(/[?&]code=([^&\s#]+)/);
  const code=m?decodeURIComponent(m[1]):raw;
  showSync('syncing','Connexion en cours…');
  try{
    const data=await dbxExchange(S.dbx.key,S.dbx.secret,code,S.dbx.verifier);
    if(data.error)throw new Error(data.error_description||data.error);
    if(!data.refresh_token)throw new Error('Pas de refresh_token reçu — vérifiez App key/secret');
    S.dbx.rt=data.refresh_token;S.dbx.ok=true;S.dbx.step='idle';S.dbx.verifier='';S.dbx.challenge='';
    saveDbx();showSync('ok','Dropbox connecté !');render();
    setTimeout(()=>showSync(null,''),3000);
  }catch(err){showSync('error','Erreur : '+err.message);}
}
function cancelOAuth(){S.dbx.step='idle';S.dbx.verifier='';S.dbx.challenge='';saveDbx();renderSettings();}
async function syncDropbox(){
  showSync('syncing','Génération du fichier Excel…');
  try{
    if(!S.dbx.rt)throw new Error('Non configuré — voir ⚙');
    const data=buildExcel(S.year);
    showSync('syncing','Renouvellement du token…');
    const token=await dbxRefresh(S.dbx.key,S.dbx.secret,S.dbx.rt);
    if(!token)throw new Error('Refresh échoué — reconnectez Dropbox');
    showSync('syncing','Envoi vers Dropbox…');
    const res=await dbxUpload(token,resolveDbxPath(S.year),new Uint8Array(data));
    if(res.error)throw new Error(res.error_summary||res.error);
    const ts=new Date().toLocaleString('fr-FR');
    S.lastSync=ts;LS.set(STORE+':ls',ts);
    showSync('ok','Synchronisé le '+ts);
    setTimeout(()=>showSync(null,''),4000);
  }catch(err){showSync('error','Erreur : '+err.message);}
}
function disconnect(){S.dbx.ok=false;S.dbx.rt='';S.dbx.key='';S.dbx.secret='';S.dbx.step='idle';saveDbx();renderSettings();renderActionBtns();}
function savePath(){S.dbx.path=document.getElementById('s-path').value.trim();saveDbx();renderSettings();renderActionBtns();}

function doCSV(){
  const me=S.entries[S.month]||[],t=computeTotals(me),BOM='\uFEFF';
  const h=['Date','Frais et Motifs','Véhicule','Km','IK','Loc. Véhicule / Avion / Train / Taxi','Parking / Péage','Hôtel','Restaurant / Bar','Téléphone','Divers'];
  const rows=me.map(e=>e.type==='ik'?[e.date,e.description,e.vehicle,e.km,e.ik,'','','','','','']:[e.date,e.description,'','','',...CAT_KEYS.map(k=>k===e.category?e.amount:'')]);
  const tr=['TOTAL','','',t.km||'',t.ik?fmtNum(t.ik):'',...CAT_KEYS.map(k=>t[k]?fmtNum(t[k]):'')];
  const csv=BOM+[h,...rows,tr].map(r=>r.map(c=>'"'+c+'"').join(';')).join('\n');
  const url=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));
  Object.assign(document.createElement('a'),{href:url,download:'NDF_Anne_'+MONTHS[S.month]+'_'+S.year+'.csv'}).click();
  URL.revokeObjectURL(url);
}


// ─── Init ─────────────────────────────────────────────────
(function init(){
  // Populate selects
  const catSel=document.getElementById('f-cat');
  CAT_KEYS.forEach((k,i)=>{const o=document.createElement('option');o.value=k;o.textContent=CAT_ICONS[i]+' '+CAT_LABELS[i];catSel.appendChild(o);});
  const vehSel=document.getElementById('f-veh');
  Object.entries(BAREME).forEach(([cv,tx])=>{const o=document.createElement('option');o.value=cv;o.textContent=cv+' — '+tx.toFixed(3)+' €/km';vehSel.appendChild(o);});
  loadYear();render();
})();
</script>
